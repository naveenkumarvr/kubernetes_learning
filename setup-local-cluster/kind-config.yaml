kind: Cluster # Tells kind to create a full Kubernetes cluster instead of another resource type.
apiVersion: kind.x-k8s.io/v1alpha4 # Uses the stable kind cluster config schema supported by current kind releases.
nodes: # Lists the Docker-backed Kubernetes nodes that will be created for this local cluster.
- role: control-plane # Creates the main control-plane node that runs the API server, scheduler, and controller manager.
  extraPortMappings: # Publishes ports from the control-plane container to your Mac so local traffic can reach workloads.
  - containerPort: 80 # Exposes port 80 inside the kind node, commonly used for HTTP ingress traffic.
    hostPort: 80 # Binds Mac port 80 to the node's port 80 so you can open HTTP services with localhost or your host IP.
    protocol: TCP # Uses TCP because standard HTTP traffic is carried over TCP.
  - containerPort: 443 # Exposes port 443 inside the kind node, commonly used for HTTPS ingress traffic.
    hostPort: 443 # Binds Mac port 443 to the node's port 443 so local HTTPS traffic reaches the cluster directly.
    protocol: TCP # Uses TCP because HTTPS also runs over TCP.
- role: worker # Adds a worker node so application pods can be scheduled away from the control plane, closer to a real cluster layout.
- role: worker # Adds a second worker node to test multi-node scheduling, load distribution, and replica placement.
networking: # Overrides cluster networking behavior where kind's defaults are not enough for local access.
  apiServerAddress: "0.0.0.0" # Makes the Kubernetes API server listen on all host interfaces so it is reachable beyond localhost when needed.