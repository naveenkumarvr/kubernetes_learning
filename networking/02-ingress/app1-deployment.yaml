# App1: Simple HTTP echo server
# This deployment creates a simple HTTP server that responds with "App1"

apiVersion: v1
kind: Namespace
metadata:
  name: app1

---
# Deployment for App1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: app1
  labels:
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from App1! You are accessing the first application."
            - "-listen=:80"
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi

---
# Service for App1
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: app1
  labels:
    app: app1
spec:
  type: ClusterIP
  selector:
    app: app1
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
