# Path-based routing Ingress
# This demonstrates routing traffic to different services based on URL paths
# - /app1/* -> App1
# - /app2/* -> App2

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: path-based-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # Route /app1 to App1 service
          - path: /app1
            pathType: Prefix
            backend:
              service:
                name: app1-service
                namespace: app1
                port:
                  number: 80
          # Route /app2 to App2 service
          - path: /app2
            pathType: Prefix
            backend:
              service:
                name: app2-service
                namespace: app2
                port:
                  number: 80
