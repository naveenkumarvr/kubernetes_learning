# Path-based routing Ingress for App1
# This demonstrates routing traffic to App1 service based on URL path /app1

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: path-based-ingress-app1
  namespace: app1
  annotations:
    # Tells Traefik to use the 'web' entrypoint (port 80) for routing HTTP traffic
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # Route /app1 to App1 service
          - path: /app1
            pathType: Prefix
            backend:
              service:
                name: app1-service
                port:
                  number: 80

