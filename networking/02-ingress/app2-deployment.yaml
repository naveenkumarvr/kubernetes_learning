# App2: Simple HTTP echo server
# This deployment creates a simple HTTP server that responds with "App2"

apiVersion: v1
kind: Namespace
metadata:
  name: app2

---
# Deployment for App2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  namespace: app2
  labels:
    app: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from App2! You are accessing the second application."
            - "-listen=:80"
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi

---
# Service for App2
apiVersion: v1
kind: Service
metadata:
  name: app2-service
  namespace: app2
  labels:
    app: app2
spec:
  type: ClusterIP
  selector:
    app: app2
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
