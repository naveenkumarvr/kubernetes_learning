# KIND cluster configuration for Ingress Controller demo
# This configuration sets up a cluster with extra port mappings for ingress
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ingress-demo
nodes:
- role: control-plane
  # Extra port mappings for ingress
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
- role: worker 
- role: worker 
networking: 
  apiServerAddress: "0.0.0.0" 
