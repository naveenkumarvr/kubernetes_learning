# Host-based routing Ingress for App1
# This demonstrates routing traffic to App1 service based on hostname app1.local
#
# NOTE: For this to work, you need to add entries to your /etc/hosts file:
# 127.0.0.1 app1.local

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: host-based-ingress-app1
  namespace: app1
  annotations:
    # Tells Traefik to use the 'web' entrypoint (port 80) for routing HTTP traffic
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    # Route app1.local to App1 service
    - host: app1.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app1-service
                port:
                  number: 80

