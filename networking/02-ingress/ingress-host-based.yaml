# Host-based routing Ingress
# This demonstrates routing traffic to different services based on hostnames
# - app1.local -> App1 service
# - app2.local -> App2 service
# 
# NOTE: For this to work, you need to add entries to your /etc/hosts file:
# 127.0.0.1 app1.local
# 127.0.0.1 app2.local

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: host-based-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    # Route app1.local to App1 service
    - host: app1.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app1-service
                namespace: app1
                port:
                  number: 80
    # Route app2.local to App2 service
    - host: app2.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app2-service
                namespace: app2
                port:
                  number: 80
