# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: policy-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: db
        image: wbitt/network-multitool
        ports:
        - containerPort: 80
---
#service
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: policy-lab
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: database